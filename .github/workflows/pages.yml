name: Deploy docs to Pages

# docs/ を GitHub Pages として公開する。トップ（docs/index.html）から
#   - ユーザーガイド（docs/help/ … エンドユーザー向けマニュアル）
#   - 設計資料（docs/architecture-note/ … 開発者向け）
# へ振り分ける。マニュアルと開発者向け資料は**並列**（マニュアルは設計資料の下に置かない）。
# 事前に一度だけ：リポジトリの Settings → Pages → Build and deployment → Source を
# 「GitHub Actions」に設定しておくこと（未設定だと最初の deploy が失敗する）。
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload docs as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
